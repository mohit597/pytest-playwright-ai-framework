name: UI Tests — InvenTree Parts Module

on:
  push:
    branches: [abhishek/ui, main]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    env:
      INVENTREE_URL: http://localhost:8000
      INVENTREE_USER: admin
      INVENTREE_PASS: inventree
      MOCK_MODE: "false"
      UPDATE_SNAPSHOTS: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start InvenTree via Docker Compose
        working-directory: .
        run: |
          docker compose up -d
          echo "Waiting for InvenTree to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/api/ > /dev/null 2>&1; do sleep 3; done'
          echo "InvenTree is ready."

      - name: D3 — Pre-flight API health check
        run: |
          python scripts/health_check.py --base-url http://localhost:8000
        continue-on-error: false

      - name: Install Python dependencies
        working-directory: automation/ui
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run UI tests
        working-directory: automation/ui
        run: |
          pytest tests/ -v --html=report.html --self-contained-html
        continue-on-error: true

      - name: Run visual regression tests separately
        working-directory: automation/ui
        run: |
          pytest tests/test_visual_regression.py -v -m visual --html=visual-report.html --self-contained-html
        continue-on-error: true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-reports
          path: |
            automation/ui/report.html
            automation/ui/visual-report.html
            automation/ui/test-results/
          retention-days: 7

      - name: Upload visual snapshots (on update)
        uses: actions/upload-artifact@v4
        if: env.UPDATE_SNAPSHOTS == 'true'
        with:
          name: visual-snapshots
          path: automation/ui/snapshots/
          retention-days: 30
