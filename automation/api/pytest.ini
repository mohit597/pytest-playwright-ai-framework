[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Markers
#
# Suite-level  (select an entire test suite)
#   pytest -m contract          → schemathesis OpenAPI contract tests only
#   pytest -m mock              → D2 mock-API tests (MOCK_MODE=true required)
#   pytest -m "not contract"    → all functional API tests, no contract fuzz
#
# Test-type  (cross-suite selection)
#   pytest -m health            → D3 pre-flight health checks
#   pytest -m crud              → CRUD operation tests
#   pytest -m validation        → field validation / error-handling tests
#   pytest -m filtering         → filtering, pagination, search tests
#   pytest -m cleanup           → fixture idempotency / orphan-cleanup tests
#
# UI suite marks  (ui/pytest.ini owns these; listed here for cross-repo clarity)
#   pytest -m ui                → all Playwright UI tests
#   pytest -m visual            → D1 visual regression snapshot tests
#   pytest -m cross_functional  → end-to-end cross-layer tests
# ---------------------------------------------------------------------------

markers =
    # Suite-level tags
    contract: schemathesis OpenAPI contract tests — validates API against its own spec (Shift Left D-contract)
    mock: Mock API tests using recorded JSON fixtures (D2) — requires MOCK_MODE=true
    ui: Playwright UI automation tests (defined in automation/ui/pytest.ini)
    visual: Visual regression snapshot tests (D1)
    cross_functional: Cross-layer end-to-end flow tests

    # Test-type tags
    health: Pre-flight health check tests (D3) — must run before all others
    crud: Core CRUD operation tests
    filtering: Filtering, pagination and search tests
    validation: Field validation and error-handling tests
    cleanup: Pre/post-suite data cleanup and fixture idempotency tests

addopts = -v --tb=short --alluredir=../../allure-results
