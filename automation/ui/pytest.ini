[pytest]
# ---------------------------------------------------------------------------
# Markers
#
# Suite-level  (select an entire test suite)
#   pytest -m ui                → all Playwright UI tests
#   pytest -m visual            → D1 visual regression snapshot tests only
#   pytest -m cross_functional  → cross-layer end-to-end flow tests
#
# API suite marks (api/pytest.ini owns these; listed for cross-repo clarity)
#   pytest -m contract          → schemathesis OpenAPI contract tests
#   pytest -m mock              → D2 mock-API tests
#   pytest -m health            → D3 pre-flight health checks
# ---------------------------------------------------------------------------

markers =
    # Suite-level tags
    ui: All Playwright UI automation tests
    visual: Visual regression snapshot tests (D1) — PIL/numpy screenshot comparison
    cross_functional: Cross-layer end-to-end flow tests (API gate + UI)

    # Mirrored from API suite (cross-repo awareness)
    contract: schemathesis OpenAPI contract tests (defined in automation/api/pytest.ini)
    mock: Mock API tests (defined in automation/api/pytest.ini)
    health: Pre-flight health check tests (defined in automation/api/pytest.ini)

addopts =
    --screenshot=only-on-failure
    --output=test-results
    --html=reports/ui-report.html
    --self-contained-html
    --alluredir=../../allure-results

testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*
