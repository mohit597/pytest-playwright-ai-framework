# ANYMUS — InvenTree AUT (Application Under Test)
# Spins up the full InvenTree stack for local testing.
#
# Usage:
#   docker compose up -d            # start all services in background
#   docker compose down             # stop and remove containers
#   docker compose logs -f          # stream logs
#
# After startup, InvenTree is available at:
#   http://inventree.localhost  (via nginx proxy on port 80)
#   http://localhost:80         (same, via localhost alias)
#
# Credentials: admin / inventree

version: "3.9"

services:

  inventree-db:
    image: postgres:14-alpine
    container_name: inventree-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${INVENTREE_DB_NAME:-inventree}
      POSTGRES_USER:     ${INVENTREE_DB_USER:-inventree}
      POSTGRES_PASSWORD: ${INVENTREE_DB_PASSWORD:-inventree}
    volumes:
      - inventree_pgdata:/var/lib/postgresql/data
    networks:
      - inventree_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTREE_DB_USER:-inventree}"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventree-server:
    image: inventree/inventree:stable
    container_name: inventree-server
    restart: unless-stopped
    depends_on:
      inventree-db:
        condition: service_healthy
    environment:
      INVENTREE_DB_ENGINE:   django.db.backends.postgresql
      INVENTREE_DB_NAME:     ${INVENTREE_DB_NAME:-inventree}
      INVENTREE_DB_USER:     ${INVENTREE_DB_USER:-inventree}
      INVENTREE_DB_PASSWORD: ${INVENTREE_DB_PASSWORD:-inventree}
      INVENTREE_DB_HOST:     inventree-db
      INVENTREE_DB_PORT:     5432
      INVENTREE_ADMIN_USER:  ${INVENTREE_ADMIN_USER:-admin}
      INVENTREE_ADMIN_EMAIL: ${INVENTREE_ADMIN_EMAIL:-admin@anymus.local}
      INVENTREE_ADMIN_PASSWORD: ${INVENTREE_ADMIN_PASS:-inventree}
      INVENTREE_SECRET_KEY:  ${INVENTREE_SECRET_KEY:-anymus-hackathon-dev-secret-key-2026}
      INVENTREE_DEBUG:       False
      INVENTREE_SITE_URL:    http://inventree.localhost
      GUNICORN_TIMEOUT:      90
    volumes:
      - inventree_media:/home/inventree/data/media
      - inventree_static:/home/inventree/data/static
    networks:
      - inventree_default
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  inventree-proxy:
    image: nginx:1.25-alpine
    container_name: inventree-proxy
    restart: unless-stopped
    depends_on:
      inventree-server:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - inventree_static:/usr/share/nginx/html/static:ro
      - inventree_media:/usr/share/nginx/html/media:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - inventree_default

volumes:
  inventree_pgdata:
    name: inventree_pgdata
  inventree_media:
    name: inventree_media
  inventree_static:
    name: inventree_static

networks:
  inventree_default:
    name: inventree_default
    driver: bridge
