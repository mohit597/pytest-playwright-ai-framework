# ANYMUS — UI Test Proxy
#
# Chromium treats *.localhost as loopback (RFC 6761) and refuses to connect to
# remote hosts via that TLD.  This Nginx acts as a non-localhost reverse proxy:
#
#   Playwright navigates to http://anymus-ui/<path>
#     → Nginx forwards to the InvenTree Caddy proxy (inventree-proxy)
#       with Host: inventree.localhost so InvenTree's SITE_URL check passes.
#
# Static and media files are served by Caddy from its own volume mounts —
# no need to duplicate them here.

server {
    listen 80;
    server_name anymus-ui;

    # Pass all traffic to the Caddy proxy, overriding Host so InvenTree accepts the request.
    location / {
        proxy_pass         http://inventree-proxy;
        proxy_set_header   Host              inventree.localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_read_timeout 120s;

        # Required for the InvenTree SPA: allow all response codes through.
        proxy_intercept_errors off;
    }
}
